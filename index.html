<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- fav icon -->
    <link rel="shortcut icon" href="./img/github-logo.png" type="image/x-icon">

    <!-- daisyui & tailwindcss link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- css link  -->
    <link rel="stylesheet" href="./style.css">
</head>

<body class="max-w-[1600px] mx-auto">

    <main>

        <section id="signIn" class="min-h-screen flex hidden items-center justify-center "> <!-- Sign in Section -->

            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 grid gap-3.5">
                <div class="img-text-div flex flex-col items-center">
                    <div>
                        <img class="h-[100px] w-[100px]" src="./img/github-logo.png" alt="github-logo">
                    </div>
                    <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
                    <p>Sign in to manage your issues</p>
                </div>

                <label class="label font-black text-[14px]">Username</label>
                <input id="login-name" type="text" class="input" placeholder="Enter Username" />

                <label class="label font-black text-[14px]">Password</label>
                <input id="login-pas" type="password" class="input" placeholder="Enter Password" />

                <button class="btn btn-active btn-primary" onclick="validation()">Sign In</button>
            </fieldset>

        </section> <!-- END Sign in Section -->

        <section id="app-section" class=""> <!-- ⚠️ ADD hidden --> <!-- Main App -->

            <nav class="flex justify-between p-2.5 bg-amber-50"> <!-- Nav Section -->
                <div class=" flex align-middle">
                    <img class="h-9 w-9" src="./img/github-logo.png" alt="github-logo">
                    <h1 class="text-2xl font-bold ml-1">GitHub Issues Tracker</h1>
                </div>

                <div class="flex">
                    <label class="input mr-1.5">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search issues..." />
                    </label>
                    <button class="btn rounded-[5px] btn-primary">+ New Issue</button>
                </div>
                </div>

            </nav>

        </section> <!-- END Nav Section -->



    </main>











    <script> // JS ***




    </script>
    <!-- JS link  -->
    <script src="./script.js"></script>
</body>

</html>
